services:
  # ─── Infrastructure ──────────────────────────────────────────────────────────

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 250M
        reservations:
          memory: 100M
    environment:
      POSTGRES_USER: tecbrain
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: tecbrain
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tecbrain']
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Services ────────────────────────────────────────────────────────────────

  scraper:
    build:
      context: .
      dockerfile: apps/scraper/Dockerfile
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 300M
        reservations:
          memory: 100M
    environment:
      PORT: '3001'
      SCRAPER_SECRET: '${SCRAPER_SECRET}'
    volumes:
      - sessions_data:/app/data/sessions
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3001/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  core:
    build:
      context: .
      dockerfile: apps/core/Dockerfile
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 400M
        reservations:
          memory: 100M
    environment:
      PORT: '3002'
      SCRAPER_URL: 'http://scraper:3001'
      DATABASE_URL: 'postgresql://tecbrain:${POSTGRES_PASSWORD}@db:5432/tecbrain'
      DB_ENCRYPTION_KEY: '${DB_ENCRYPTION_KEY}'
      TELEGRAM_BOT_TOKEN: '${TELEGRAM_BOT_TOKEN}'
      GOOGLE_OAUTH_CLIENT_PATH: '/app/data/credentials/oauth_client.json'
      DRIVE_ROOT_FOLDER_ID: '${DRIVE_ROOT_FOLDER_ID}'
      CRON_SCHEDULE: '${CRON_SCHEDULE}'
      CORE_CONCURRENCY: '${CORE_CONCURRENCY}'
      INTERNAL_API_SECRET: '${INTERNAL_API_SECRET}'
      SCRAPER_SECRET: '${SCRAPER_SECRET}'
    volumes:
      - credentials_data:/app/data/credentials:ro
    depends_on:
      db:
        condition: service_healthy
      scraper:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3002/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 200M
        reservations:
          memory: 64M
    environment:
      DATABASE_URL: 'postgresql://tecbrain:${POSTGRES_PASSWORD}@db:5432/tecbrain'
      DB_ENCRYPTION_KEY: '${DB_ENCRYPTION_KEY}'
      TELEGRAM_BOT_TOKEN: '${TELEGRAM_BOT_TOKEN}'
      GOOGLE_OAUTH_CLIENT_PATH: '/app/data/credentials/oauth_client.json'
      CORE_BASE_URL: 'http://core:3002'
      ADMIN_ALERT_CHAT_ID: '${ADMIN_ALERT_CHAT_ID}'
    volumes:
      - credentials_data:/app/data/credentials:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  sessions_data:
  credentials_data:
